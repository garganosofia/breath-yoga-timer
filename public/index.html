<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Respiración & yoga</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <meta name="theme-color" content="#050810">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1 id="h-title">Respiración guiada</h1>
    <p class="sub" id="h-sub">Inhala · retén · exhala · vacío — con señales opcionales.</p>
    <div class="lang">
      <button type="button" id="l-es" class="is-on">ES</button>
      <button type="button" id="l-en">EN</button>
    </div>
  </header>
  <div class="tabs">
    <button type="button" id="tab-b" class="is-on">Breath</button>
    <button type="button" id="tab-y">Yoga</button>
  </div>
  <section class="panel is-on" id="p-breath">
    <figure class="zen">
      <img src="assets/breath-zen.png" alt="" loading="lazy" decoding="async">
      <figcaption id="zen-caption">Respira. El silencio también es un mantra.</figcaption>
    </figure>
    <div class="grid4">
      <label>
        <span id="lb-in">Inhala (s)</span>
        <div class="stepper">
          <button type="button" class="stepper__btn" data-target="in" data-step="-1" aria-label="−">−</button>
          <input type="text" inputmode="numeric" pattern="[0-9]*" class="stepper__val" id="in" data-min="1" data-max="30" value="4">
          <button type="button" class="stepper__btn" data-target="in" data-step="1" aria-label="+">+</button>
        </div>
      </label>
      <label>
        <span id="lb-h1">Retén (s)</span>
        <div class="stepper">
          <button type="button" class="stepper__btn" data-target="h1" data-step="-1" aria-label="−">−</button>
          <input type="text" inputmode="numeric" pattern="[0-9]*" class="stepper__val" id="h1" data-min="0" data-max="30" value="4">
          <button type="button" class="stepper__btn" data-target="h1" data-step="1" aria-label="+">+</button>
        </div>
      </label>
      <label>
        <span id="lb-ex">Exhala (s)</span>
        <div class="stepper">
          <button type="button" class="stepper__btn" data-target="ex" data-step="-1" aria-label="−">−</button>
          <input type="text" inputmode="numeric" pattern="[0-9]*" class="stepper__val" id="ex" data-min="1" data-max="30" value="4">
          <button type="button" class="stepper__btn" data-target="ex" data-step="1" aria-label="+">+</button>
        </div>
      </label>
      <label>
        <span id="lb-h2">Vacío (s)</span>
        <div class="stepper">
          <button type="button" class="stepper__btn" data-target="h2" data-step="-1" aria-label="−">−</button>
          <input type="text" inputmode="numeric" pattern="[0-9]*" class="stepper__val" id="h2" data-min="0" data-max="30" value="4">
          <button type="button" class="stepper__btn" data-target="h2" data-step="1" aria-label="+">+</button>
        </div>
      </label>
    </div>
    <div class="row">
      <label><input type="checkbox" id="beep"> <span id="lb-beep">Pitido</span></label>
      <label><input type="checkbox" id="voice" checked> <span id="lb-voice">Voz</span></label>
    </div>
    <div class="voice-row" id="voice-row">
      <p class="hold-label" id="lb-voice-gender">Tipo de voz</p>
      <div class="chips-row chips-row--two">
        <button type="button" class="chip is-on" data-gender="female" id="g-f"></button>
        <button type="button" class="chip" data-gender="male" id="g-m"></button>
      </div>
    </div>
    <div class="big">
      <div class="phase" id="phase">—</div>
      <div class="n" id="num">0</div>
      <div class="elapsed" id="elapsed" hidden></div>
    </div>
    <p class="hold-label" id="lb-hold">Mantener durante</p>
    <div class="chips-row">
      <button type="button" class="chip is-on" data-dur="0" id="c-unl"></button>
      <button type="button" class="chip" data-dur="300" id="c-5"></button>
      <button type="button" class="chip" data-dur="600" id="c-10"></button>
      <button type="button" class="chip" data-dur="900" id="c-15"></button>
    </div>
    <div class="actions">
      <button type="button" class="primary" id="start">Iniciar</button>
      <button type="button" class="danger" id="stop" hidden>Detener</button>
    </div>
  </section>
  <section class="panel" id="p-yoga">
    <div id="yoga-list"></div>
  </section>
  <footer><a href="https://garganosofia.github.io/sofia-gargano-cv/">CV Sofía Gárgano</a></footer>
  <script src="app.js"></script>
</body>
</html>
